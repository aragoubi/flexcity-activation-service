# Logging configuration
logging.level.root=INFO
logging.level.com.flexcity.activation=INFO

# File logging
logging.file.name=logs/activation-service.log

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Application info (shown in /actuator/info)
info.app.name=Flexcity Activation Service
info.app.description=Optimal asset selection for power activation
info.app.version=1.0-SNAPSHOT